apis:
  - aid: sumup:sumup-rest-api
    name: SumUp REST API
    description: REST API for creating and executing checkouts, managing card readers,
      processing payments, storing customer cards, issuing refunds, retrieving transactions,
      and accessing payout data. Base URL is https://api.sumup.com with API key and
      OAuth 2.0 authentication.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.sumup.com/api
    baseURL: https://api.sumup.com
