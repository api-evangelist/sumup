aid: sumup
name: SumUp
description: European mobile payment and POS platform with REST APIs for creating
  checkout links, managing card readers, processing payments, tracking transactions,
  and accessing payout data. SumUp serves over 4 million merchants in 37 markets
  with built-in fraud protection, sandbox environments for testing, and SDKs for
  multiple programming languages.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
